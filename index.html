  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-sidebar: #0d0d0d;
      --bg-main: #111111;
      --bg-card: #1a1a1a;
      --icon-default: #5a5a5a;

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg-main); overflow: hidden; }

    .sidebar {
      width: var(--sidebar-width);

    .click-hint { position: absolute; bottom: 16px; right: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 40px; font-size: 11px; color: #aaa; pointer-events: none; z-index: 50; font-weight: 500; }

    /* Access Screen */
    .access-screen {

  </style>
</head>

<script>
// ==================== CONSTANTS ====================
const OWNER_EMAILS = ["aernatas@gmail.com", "fhuang@princetonk12.org"];
const CLIENT_ID = "30388178033-62l5t6mlimokpuge1b4hngct8bnp6rnl.apps.googleusercontent.com";
const REDIRECT_URL = "https://login.classlink.com/my/pps";
const LAUNCH_URL = "https://aernixis.github.io/clysmn/";
const SEARCH_URL = "https://www.privacywall.org/search/secure/?q={query}";

// ==================== GLOBAL STATE ====================
let currentUserEmail = null;
let isOwner = false;
let accessGranted = false;

// ==================== SETTINGS DATA ====================
const faviconMap = {
  canvas: "https://canvas.instructure.com/favicon.ico",
  docs: "https://www.gstatic.com/images/branding/product/1x/docs_2020q4_32dp.png",
  classroom: "https://upload.wikimedia.org/wikipedia/commons/5/59/Google_Classroom_Logo.png",
  classlink: "https://play-lh.googleusercontent.com/ujsa1M8GdT-fo-GfPazpUwgPXVWEOWKUgKZk-SdnUhmcL3opS24MiHe6ypEgqxGpllw",
  outlook: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Microsoft_Outlook_Icon_%282025%E2%80%93present%29.svg/1280px-Microsoft_Outlook_Icon_%282025%E2%80%93present%29.svg.png"
};
const siteNameMap = {
  canvas: "Canvas",
  docs: "Google Docs",
  classroom: "Google Classroom",
  classlink: "ClassLink",
  outlook: "Outlook"
};

let tabSettings = { favicon: "canvas", title: "" };
let panicSettings = { key: "`", shift: false, ctrl: false, alt: false, displayString: "`", url: "https://google.com" };
let bookmarks = [];
let whitelist = []; // stored in localStorage, managed by owners

let isRecordingKey = false;
let currentModifiers = { shift: false, ctrl: false, alt: false };
let currentKey = null;
let releaseTimeout = null;

// ==================== JWT DECODE ====================
function parseJwt(token) {
  try {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(base64));
  } catch(e) { return null; }
}

// ==================== GOOGLE OAUTH CALLBACK ====================
function handleGoogleCredential(response) {
  const payload = parseJwt(response.credential);
  if (!payload || !payload.email) {
    showAccessDenied("Could not read account info. Please try again.");
    return;
  }

  const email = payload.email.toLowerCase().trim();
  currentUserEmail = email;

  // Check if owner
  if (OWNER_EMAILS.map(e => e.toLowerCase()).includes(email)) {
    isOwner = true;
    accessGranted = true;
    saveSession(email, true, response.credential);
    loadSettingsData();
    grantAccess();
    return;
  }

  // Check whitelist
  loadWhitelist();
  if (whitelist.map(e => e.toLowerCase()).includes(email)) {
    isOwner = false;
    accessGranted = true;
    saveSession(email, false, response.credential);
    loadSettingsData();
    grantAccess();
    return;
  }

  // Not authorized
  showAccessDenied("Your account (" + email + ") is not authorized. Redirecting...");
  setTimeout(() => {
    window.location.href = REDIRECT_URL;
  }, 2500);
}

function showAccessDenied(msg) {
  document.getElementById('accessTitle').textContent = "Access Denied";
  document.getElementById('accessSubtitle').textContent = msg;
  document.getElementById('accessHint').textContent = "";
}

// ==================== SESSION MANAGEMENT ====================
function saveSession(email, ownerFlag, credential) {
  const session = {
    email: email,
    isOwner: ownerFlag,
    credential: credential,
    expiresAt: Date.now() + 12 * 60 * 60 * 1000 // 12 hours
  };
  localStorage.setItem('gSession', JSON.stringify(session));
}

function checkExistingSession() {
  try {
    const raw = localStorage.getItem('gSession');
    if (!raw) return false;
    const session = JSON.parse(raw);
    if (!session.expiresAt || session.expiresAt < Date.now()) {
      localStorage.removeItem('gSession');
      return false;
    }

    const email = (session.email || "").toLowerCase().trim();
    currentUserEmail = email;

    if (OWNER_EMAILS.map(e => e.toLowerCase()).includes(email)) {
      isOwner = true;
    } else {
      loadWhitelist();
      if (!whitelist.map(e => e.toLowerCase()).includes(email)) {
        // Previously whitelisted but now removed — deny
        localStorage.removeItem('gSession');
        return false;
      }
      isOwner = false;
    }

    accessGranted = true;
    return true;
  } catch(e) { return false; }
}

// ==================== WHITELIST ====================
function loadWhitelist() {
  try {
    const raw = localStorage.getItem('whitelist');
    whitelist = raw ? JSON.parse(raw) : [];
    // Always ensure owner emails are included implicitly (not stored, just owners)
  } catch(e) { whitelist = []; }
}

function saveWhitelist() {
  localStorage.setItem('whitelist', JSON.stringify(whitelist));
}

function addToWhitelist(email) {
  if (!email) return false;
  email = email.toLowerCase().trim();
  if (!email.includes('@')) return false;
  if (whitelist.map(e => e.toLowerCase()).includes(email)) return false;
  whitelist.push(email);
  saveWhitelist();
  return true;
}

function removeFromWhitelist(email) {
  whitelist = whitelist.filter(e => e.toLowerCase() !== email.toLowerCase());
  saveWhitelist();
}

// ==================== GRANT ACCESS ====================
function grantAccess() {
  const screen = document.getElementById('accessScreen');
  if (screen) screen.remove();
  document.getElementById('mainLayout').style.display = 'flex';
  initializeApp();
}

// ==================== APP INIT ====================
function loadSettingsData() {
  try {
    const savedTab = localStorage.getItem('tabSettings');
    if (savedTab) tabSettings = { ...tabSettings, ...JSON.parse(savedTab) };
    const savedPanic = localStorage.getItem('panicSettings');
    if (savedPanic) panicSettings = JSON.parse(savedPanic);
    const savedBookmarks = localStorage.getItem('bookmarks');
    if (savedBookmarks) bookmarks = JSON.parse(savedBookmarks);
  } catch(e) {}
}

function saveAppSettings() {
  localStorage.setItem('tabSettings', JSON.stringify(tabSettings));
  localStorage.setItem('panicSettings', JSON.stringify(panicSettings));
  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
}

function applyTabTitle() {
  if (tabSettings.title && tabSettings.title.trim()) {
    document.title = tabSettings.title.trim();
  }
}

function initializeApp() {
  loadSettingsData();
  loadWhitelist();
  applyTabTitle();
  renderSettingsUI();
  renderBookmarksGrid();
  setupLinkInterceptor();
}

// ==================== URL / LAUNCH HELPERS ====================
function isValidUrl(url) {
  if (!url) return false;
  const trimmed = url.trim();
  if (/^https?:\/\//i.test(trimmed)) return true;
  if (trimmed.includes('.') && !trimmed.includes(' ') && trimmed.length > 3) return true;
  return false;
}

function launchInAboutBlank(url) {
  let finalUrl;
  if (isValidUrl(url)) {
    finalUrl = /^https?:\/\//i.test(url) ? url : `https://${url}`;
  } else {
    finalUrl = SEARCH_URL.replace('{query}', encodeURIComponent(url));
  }
  const newWindow = window.open("", "_blank");
  if (newWindow) {
    const faviconUrl = faviconMap[tabSettings.favicon];
    const tabTitle = (tabSettings.title && tabSettings.title.trim()) ? tabSettings.title.trim() : siteNameMap[tabSettings.favicon];
    newWindow.document.open();
    newWindow.document.write(`<!DOCTYPE html><html><head><title>${escapeHtml(tabTitle)}</title><link rel="icon" href="${faviconUrl}"><style>*{margin:0;padding:0;box-sizing:border-box;}iframe{border:none;width:100vw;height:100vh;display:block;}body{background:#0a0a0a;}</style><script>window.open=function(){return null;};document.addEventListener('click',function(e){let t=e.target;while(t&&t!==document){if(t.tagName==='A'&&t.href){e.preventDefault();e.stopPropagation();const i=document.querySelector('iframe');if(i)i.src=t.href;return;}t=t.parentElement;}},true);<\/script></head><body><iframe src="${finalUrl}" allow="autoplay; fullscreen; clipboard-write; encrypted-media; picture-in-picture" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe></body></html>`);
    newWindow.document.close();
  }
}

function launchCurrentTabInBlank() {
  launchInAboutBlank(LAUNCH_URL);
  showToast('Launched in about:blank');
}

// ==================== SEARCH ENGINE INTERCEPTOR ====================
function setupLinkInterceptor() {
  const iframe = document.getElementById('privacywallIframe');
  if (!iframe) return;
  const inject = () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (!doc || doc.getElementById('__interceptor')) return;
      const script = doc.createElement('script');
      script.id = '__interceptor';
      script.textContent = `(function(){function send(url){window.parent.postMessage({type:'LINK_CLICK',url},'*');}document.addEventListener('click',function(e){let t=e.target;while(t&&t!==document){if(t.tagName==='A'&&t.href){e.preventDefault();send(t.href);return;}t=t.parentElement;}},true);})();`;
      doc.head.appendChild(script);
    } catch(e) {}
  };
  iframe.addEventListener('load', () => setTimeout(inject, 200));
  setTimeout(inject, 200);
}
window.addEventListener('message', (e) => {
  if (e.data?.type === 'LINK_CLICK' && e.data.url) launchInAboutBlank(e.data.url);
});

// ==================== BOOKMARKS ====================
function renderBookmarksGrid() {
  const grid = document.getElementById('bookmarksGrid');
  if (!grid) return;
  grid.innerHTML = '';
  const addCard = document.createElement('div');
  addCard.className = 'add-bookmark-card';
  addCard.onclick = () => openBookmarkModal();
  addCard.innerHTML = `<div class="add-icon">+</div><div class="add-text">Add Bookmark</div>`;
  grid.appendChild(addCard);
  bookmarks.forEach((bm, idx) => {
    const card = document.createElement('div');
    card.className = 'bookmark-card';
    card.innerHTML = `<div class="bookmark-icon">🔖</div><div class="bookmark-name">${escapeHtml(bm.name)}</div><div class="bookmark-url">${escapeHtml(bm.url.length > 40 ? bm.url.substring(0,40)+'...' : bm.url)}</div><div class="bookmark-actions"><button class="bookmark-edit-btn" data-idx="${idx}">Edit</button><button class="bookmark-delete-btn" data-idx="${idx}">Delete</button></div>`;
    card.onclick = (e) => { if (!e.target.classList.contains('bookmark-edit-btn') && !e.target.classList.contains('bookmark-delete-btn')) launchInAboutBlank(bm.url); };
    card.querySelector('.bookmark-edit-btn').onclick = (e) => { e.stopPropagation(); openBookmarkModal(idx); };
    card.querySelector('.bookmark-delete-btn').onclick = (e) => { e.stopPropagation(); deleteBookmark(idx); };
    grid.appendChild(card);
  });
}

function deleteBookmark(idx) { bookmarks.splice(idx, 1); saveAppSettings(); renderBookmarksGrid(); showToast('Bookmark deleted'); }
function openBookmarkModal(editIdx = null) {
  window.editIdx = editIdx;
  document.getElementById('modalTitle').innerText = editIdx !== null ? 'Edit Bookmark' : 'Add Bookmark';
  document.getElementById('bookmarkName').value = editIdx !== null ? bookmarks[editIdx].name : '';
  document.getElementById('bookmarkUrl').value = editIdx !== null ? bookmarks[editIdx].url : '';
  document.getElementById('bookmarkModal').classList.add('active');
}
function closeBookmarkModal() { document.getElementById('bookmarkModal').classList.remove('active'); }
function saveBookmarkWithValidation() {
  const name = document.getElementById('bookmarkName').value.trim();
  let url = document.getElementById('bookmarkUrl').value.trim();
  if (!name) { showError('Please enter a name'); return; }
  if (!isValidUrl(url)) { showError('Please enter a valid URL'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  if (window.editIdx !== null) bookmarks[window.editIdx] = { name, url };
  else bookmarks.unshift({ name, url });
  saveAppSettings();
  closeBookmarkModal();
  renderBookmarksGrid();
  window.editIdx = null;
}
function showError(msg) {
  const errDiv = document.getElementById('urlError');
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
  setTimeout(() => errDiv.style.display = 'none', 2000);
}

// ==================== SETTINGS UI ====================
function renderSettingsUI() {
  const container = document.getElementById('settingsContainer');
  if (!container) return;

  const currentTitle = tabSettings.title || '';
  const currentFavicon = tabSettings.favicon || 'canvas';

  let whitelistSection = '';
  if (isOwner) {
    const wlItems = whitelist.length === 0
      ? '<div class="whitelist-item" style="color:var(--text-secondary);">No whitelisted emails yet</div>'
      : whitelist.map(e => `<div class="whitelist-item"><span>${escapeHtml(e)}</span><button class="remove-whitelist" onclick="removeWhitelistEntry('${escapeHtml(e)}')">Remove</button></div>`).join('');
    whitelistSection = `
      <div class="settings-section">
        <h2>Whitelist Management <span class="owner-badge">Owner Only</span></h2>
        <div class="setting-field">
          <label>Authorized Emails (can access the site):</label>
          <div id="whitelistContainer">${wlItems}</div>
          <div class="add-whitelist-row">
            <input type="text" class="add-whitelist-input" id="newWhitelistEmail" placeholder="user@example.com" autocomplete="off" />
            <button class="add-whitelist-btn" onclick="addWhitelistEntry()">+ Add</button>
          </div>
        </div>
      </div>
    `;
  }

  container.innerHTML = `
    <div class="settings-section">
      <h2>Launch clysmn</h2>
      <div class="setting-field">
        <button class="launch-blank-btn" onclick="launchCurrentTabInBlank()">Open clysmn in about:blank</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>About:Blank Tab Settings</h2>
      <div class="favicon-preview">
        <div class="favicon-img" id="faviconDisplay"><img src="${faviconMap[currentFavicon]}" style="width:32px;height:32px;object-fit:contain;"></div>
        <div class="preview-text" id="siteNameDisplay">${escapeHtml(currentTitle || siteNameMap[currentFavicon])}</div>
      </div>
      <div class="setting-field">
        <label>Favicon / Site Name Preset:</label>
        <select id="faviconSelect" onchange="onFaviconChange()">
          <option value="canvas" ${currentFavicon==='canvas'?'selected':''}>Canvas</option>
          <option value="docs" ${currentFavicon==='docs'?'selected':''}>Google Docs</option>
          <option value="classroom" ${currentFavicon==='classroom'?'selected':''}>Google Classroom</option>
          <option value="classlink" ${currentFavicon==='classlink'?'selected':''}>ClassLink</option>
          <option value="outlook" ${currentFavicon==='outlook'?'selected':''}>Outlook</option>
        </select>
      </div>
      <div class="setting-field">
        <label>Custom Tab Title (overrides preset name):</label>
        <input type="text" id="customTitle" value="${escapeHtml(currentTitle)}" placeholder="Leave blank to use preset name" autocomplete="off" />
      </div>
      <div class="setting-field">
        <button class="save-btn" onclick="saveTabSettings()">Save Tab Settings</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>Panic Button</h2>
      <div class="setting-field">
        <label>Panic Key (press to record — supports Shift, Ctrl, Alt + any key):</label>
        <button id="recordKeyBtn" class="key-record-btn" onclick="startKeyRecording()">${escapeHtml(panicSettings.displayString || '`')}</button>
      </div>
      <div class="setting-field">
        <label>Redirect URL:</label>
        <input type="text" id="panicUrl" value="${escapeHtml(panicSettings.url)}" onblur="savePanicUrl()" autocomplete="off" />
      </div>
    </div>

    ${whitelistSection}

    <div class="settings-section">
      <h2>Account</h2>
      <div class="setting-field" style="color:var(--text-secondary);font-size:14px;">
        Signed in as: <strong style="color:var(--text-primary);">${escapeHtml(currentUserEmail || 'Unknown')}${isOwner ? ' <span class="owner-badge">Owner</span>' : ''}</strong>
      </div>
      <div class="setting-field">
        <button class="key-record-btn" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  `;
}

function onFaviconChange() {
  const sel = document.getElementById('faviconSelect');
  const val = sel.value;
  const faviconDisplay = document.getElementById('faviconDisplay');
  const siteNameDisplay = document.getElementById('siteNameDisplay');
  if (faviconDisplay) faviconDisplay.innerHTML = `<img src="${faviconMap[val]}" style="width:32px;height:32px;object-fit:contain;">`;
  if (siteNameDisplay) {
    const customTitle = document.getElementById('customTitle').value.trim();
    siteNameDisplay.textContent = customTitle || siteNameMap[val];
  }
}

function saveTabSettings() {
  const favicon = document.getElementById('faviconSelect').value;
  const title = (document.getElementById('customTitle').value || '').trim();
  tabSettings.favicon = favicon;
  tabSettings.title = title;
  saveAppSettings();
  applyTabTitle();
  // Update preview
  document.getElementById('faviconDisplay').innerHTML = `<img src="${faviconMap[favicon]}" style="width:32px;height:32px;object-fit:contain;">`;
  document.getElementById('siteNameDisplay').textContent = title || siteNameMap[favicon];
  showToast('Tab settings saved');
}

function savePanicUrl() {
  const newUrl = document.getElementById('panicUrl').value;
  if (newUrl) { panicSettings.url = newUrl; saveAppSettings(); showToast('Panic URL saved'); }
}

// ==================== WHITELIST MANAGEMENT ====================
function addWhitelistEntry() {
  const input = document.getElementById('newWhitelistEmail');
  const email = (input.value || '').trim();
  if (!email.includes('@')) { showToast('Enter a valid email'); return; }
  if (addToWhitelist(email)) {
    input.value = '';
    refreshWhitelistUI();
    showToast('Email added to whitelist');
  } else {
    showToast('Already in whitelist or invalid');
  }
}

function removeWhitelistEntry(email) {
  removeFromWhitelist(email);
  refreshWhitelistUI();
  showToast('Email removed');
}

function refreshWhitelistUI() {
  const container = document.getElementById('whitelistContainer');
  if (!container) return;
  container.innerHTML = whitelist.length === 0
    ? '<div class="whitelist-item" style="color:var(--text-secondary);">No whitelisted emails yet</div>'
    : whitelist.map(e => `<div class="whitelist-item"><span>${escapeHtml(e)}</span><button class="remove-whitelist" onclick="removeWhitelistEntry('${escapeHtml(e)}')">Remove</button></div>`).join('');
}

// ==================== SIGN OUT ====================
function signOut() {
  localStorage.removeItem('gSession');
  window.location.reload();
}

// ==================== PANIC KEY ====================
function triggerPanic() { window.location.href = panicSettings.url; }

function startKeyRecording() {
  isRecordingKey = true;
  currentModifiers = { shift: false, ctrl: false, alt: false };
  currentKey = null;
  if (releaseTimeout) clearTimeout(releaseTimeout);
  const btn = document.getElementById('recordKeyBtn');
  if (btn) { btn.classList.add('recording'); btn.textContent = 'Press keys...'; }
}

function updateKeyDisplay() {
  const btn = document.getElementById('recordKeyBtn');
  if (!btn) return;
  if (!isRecordingKey) { btn.textContent = panicSettings.displayString || 'Click to record key'; return; }
  const modifiers = [];
  if (currentModifiers.ctrl) modifiers.push('Ctrl');
  if (currentModifiers.shift) modifiers.push('Shift');
  if (currentModifiers.alt) modifiers.push('Alt');
  let display = modifiers.length > 0 ? modifiers.join('+') + '+' : '';
  display += currentKey ? currentKey.toUpperCase() : '?';
  btn.textContent = display;
}

function savePanicKey() {
  if (!currentKey) return;
  panicSettings.shift = currentModifiers.shift;
  panicSettings.ctrl = currentModifiers.ctrl;
  panicSettings.alt = currentModifiers.alt;
  panicSettings.key = currentKey;
  const mods = [];
  if (panicSettings.ctrl) mods.push('Ctrl');
  if (panicSettings.shift) mods.push('Shift');
  if (panicSettings.alt) mods.push('Alt');
  let display = mods.length > 0 ? mods.join('+') + '+' : '';
  display += currentKey.toUpperCase();
  panicSettings.displayString = display;
  saveAppSettings();
  updateKeyDisplay();
}

function stopKeyRecording() {
  if (!isRecordingKey) return;
  if (currentKey) savePanicKey();
  isRecordingKey = false;
  if (releaseTimeout) clearTimeout(releaseTimeout);
  const btn = document.getElementById('recordKeyBtn');
  if (btn) btn.classList.remove('recording');
  updateKeyDisplay();
}

function keydownHandler(e) {
  if (!accessGranted) return;
  if (!isRecordingKey) {
    // Check panic key
    const kMatch = e.key && (e.key.toLowerCase() === (panicSettings.key || '').toLowerCase() || e.key === panicSettings.key);
    if (kMatch && e.shiftKey === panicSettings.shift && e.ctrlKey === panicSettings.ctrl && e.altKey === panicSettings.alt) {
      triggerPanic();
    }
    return;
  }

  // Recording mode
  if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta') {
    // Just track modifier state, don't prevent default
    if (e.key === 'Shift') currentModifiers.shift = true;
    if (e.key === 'Control') currentModifiers.ctrl = true;
    if (e.key === 'Alt') currentModifiers.alt = true;
    updateKeyDisplay();
    return;
  }

  e.preventDefault();
  e.stopPropagation();
  if (releaseTimeout) clearTimeout(releaseTimeout);

  let key = e.key;
  if (key === ' ') key = 'Space';
  if (key === 'Escape') key = 'Esc';
  if (key === 'ArrowUp') key = '↑';
  if (key === 'ArrowDown') key = '↓';
  if (key === 'ArrowLeft') key = '←';
  if (key === 'ArrowRight') key = '→';
  if (key === 'Tab') key = 'Tab';
  if (key === 'Enter') key = 'Enter';
  if (key === 'Backspace') key = 'Backspace';
  if (key === 'Delete') key = 'Delete';

  currentKey = key;
  updateKeyDisplay();

  // If no modifiers held, auto-save immediately on keyup
}

function keyupHandler(e) {
  if (!isRecordingKey) return;

  if (e.key === 'Shift') { currentModifiers.shift = false; updateKeyDisplay(); }
  if (e.key === 'Control') { currentModifiers.ctrl = false; updateKeyDisplay(); }
  if (e.key === 'Alt') { currentModifiers.alt = false; updateKeyDisplay(); }

  // If a real key was pressed, stop recording
  if (currentKey && e.key !== 'Shift' && e.key !== 'Control' && e.key !== 'Alt' && e.key !== 'Meta') {
    stopKeyRecording();
    return;
  }

  // If modifier released and we have a key, save
  if (currentKey && !currentModifiers.shift && !currentModifiers.ctrl && !currentModifiers.alt) {
    if (releaseTimeout) clearTimeout(releaseTimeout);
    releaseTimeout = setTimeout(() => stopKeyRecording(), 300);
  }
}

document.addEventListener('keydown', keydownHandler);
document.addEventListener('keyup', keyupHandler);

// ==================== TAB SWITCHING ====================
function switchTab(tab, btn) {
  document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`${tab}Tab`).classList.add('active');
  if (tab === 'library') renderBookmarksGrid();
  if (tab === 'settings') renderSettingsUI();
  if (tab === 'explore') setTimeout(() => setupLinkInterceptor(), 300);
}

// ==================== UTILS ====================
function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:40px;z-index:9999;border:1px solid #2c2c2c;font-family:DM Sans,sans-serif;';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// ==================== GLOBALS FOR HTML ONCLICK ====================
window.switchTab = switchTab;
window.closeBookmarkModal = closeBookmarkModal;
window.saveBookmarkWithValidation = saveBookmarkWithValidation;
window.saveTabSettings = saveTabSettings;
window.onFaviconChange = onFaviconChange;
window.savePanicUrl = savePanicUrl;
window.startKeyRecording = startKeyRecording;
window.triggerPanic = triggerPanic;
window.launchCurrentTabInBlank = launchCurrentTabInBlank;
window.addWhitelistEntry = addWhitelistEntry;
window.removeWhitelistEntry = removeWhitelistEntry;
window.signOut = signOut;
window.handleGoogleCredential = handleGoogleCredential;

// ==================== BOOT ====================
(function boot() {
  if (checkExistingSession()) {
    const screen = document.getElementById('accessScreen');
    if (screen) screen.remove();
    document.getElementById('mainLayout').style.display = 'flex';
    initializeApp();
  }
  // Otherwise Google GSI auto-prompt will trigger handleGoogleCredential
})();
</script>
